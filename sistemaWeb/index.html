<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Botões</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .navbar {
            width: 100%;
            height: 50px;
            background-color: #6200ea;
            color: white;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
        }

        .navbar button::before {
            content: "";
            display: inline-block;
            width: 0;
            height: 0;
            margin-right: 5px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 5px solid white;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;

            width: 75%;
            max-width: 600px;
        }

        .sub-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
            margin: 5px;

            width: 80%;
        }

        .sub-card input {
            width: 40px;
            margin: 0 10px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #6200ea;
            color: white;
            cursor: pointer;

            width: 80%;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }
        #backButton{
            width: auto;
        }

        
        /* .butons-group{
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        } */
        /* .cardLabel{
            width: 100%;
            background: aquamarine;
            align-items: center;
            text-align: center;
            height: 3rem;
            border-radius: 10px 10px 0px 0px;
            display: flex;
            
            justify-content: center;
        } */
    </style>
</head>
<body>
    <div class="navbar">
        <button id="backButton" class="hidden" onclick="goToInitialCard()"></button>
        <span>Navbar</span>
    </div>
    <div class="container">
        <div id="initialCard" class="card">
            <label class="cardLabel">Nazide Pressus</label>
            
            <button id="btn1" onclick="showSecondCard()">Botão 1</button>
            <button id="btn2" onclick="showThirdCard()" disabled>Botão 2</button>
            <button id="btn3" onclick="showThirdCard()" disabled>Botão 3</button>
            <button id="btn4" onclick="showThirdCard()" disabled>Botão 4</button>
      
        </div>
        <div id="secondCard" class="card hidden">
            <label>Escolha um número</label>
            <button onclick="handleNumberClick(0)">0</button>
            <button onclick="handleNumberClick(1)">1</button>
            <button onclick="handleNumberClick(2)">2</button>
            <button onclick="handleNumberClick(3)">3</button>
            <button onclick="handleNumberClick(4)">4</button>
            <button onclick="handleNumberClick(5)">5</button>
        </div>
        <div id="thirdCard" class="card hidden">
            <label>Card Externo</label>
            <div class="sub-card">
                <div>
                    <label>Texto 1</label>
                    <input type="number" min="1" max="10" oninput="checkInputValue(this)">
                    <span>r</span>
                </div>
                <button>Iniciar</button>
            </div>
            <div class="sub-card">
                <div>
                    <label>Texto 2</label>
                    <input type="number" min="1" max="10" oninput="checkInputValue(this)">
                    <span>r</span>
                </div>
                <button>Iniciar</button>
            </div>
            <div class="sub-card">
                <div>
                    <label>Texto 3</label>
                    <input type="number" min="1" max="10" oninput="checkInputValue(this)">
                    <span>r</span>
                </div>
                <button>Iniciar</button>
            </div>
            <div class="sub-card">
                <div>
                    <label>Texto 4</label>
                    <input type="number" min="1" max="10" oninput="checkInputValue(this)">
                    <span>r</span>
                </div>
                <button>Iniciar</button>
            </div>
            <div class="sub-card">
                <div>
                    <label>Texto 5</label>
                    <input type="number" min="1" max="10" oninput="checkInputValue(this)">
                    <span>r</span>
                </div>
                <button>Iniciar</button>
            </div>
        </div>
    </div>

    <script>
        function showThirdCard() {
            document.getElementById('initialCard').classList.add('hidden');
            document.getElementById('thirdCard').classList.remove('hidden');
            document.getElementById('backButton').classList.remove('hidden');
        }

        function showSecondCard() {
            document.getElementById('initialCard').classList.add('hidden');
            document.getElementById('secondCard').classList.remove('hidden');
            document.getElementById('backButton').classList.remove('hidden');
        }

        function handleNumberClick(number) {
            document.getElementById('secondCard').classList.add('hidden');
            if (number === 0) {
                goToInitialCard();
            } else {
                document.getElementById('secondCard').classList.add('hidden');
                document.getElementById('initialCard').classList.remove('hidden');
                document.getElementById('btn2').disabled = false;
                document.getElementById('btn3').disabled = false;
                document.getElementById('btn4').disabled = false;
                document.getElementById('backButton').classList.add('hidden');
            }
        }

        function goToInitialCard() {
            document.getElementById('initialCard').classList.remove('hidden');
            document.getElementById('secondCard').classList.add('hidden');
            document.getElementById('thirdCard').classList.add('hidden');
            document.getElementById('backButton').classList.add('hidden');
        }

        function checkInputValue(input) {
            if (input.value > 10) {
                input.value = 10;
            }
        }
    </script>
</body>
</html>
